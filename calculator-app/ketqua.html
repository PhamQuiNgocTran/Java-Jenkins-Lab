<!DOCTYPE html>
<html lang='vi'>
<head>
<meta charset='UTF-8'>
<title>Máy Tính Của Trân</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head>
<body class='bg-light'>
<div class='container mt-5'>
<div class='card shadow'>
<div class='card-header bg-primary text-white'>
<h2 class='text-center mb-0'>KẾT QUẢ THUẬT TOÁN MÁY TÍNH</h2>
</div>
<div class='card-body'>
<table class='table table-hover table-bordered text-center'>
<thead class='table-dark'><tr><th>Phép tính</th><th>Công thức</th><th>Kết quả</th></tr></thead>
<tbody>
<tr><td>Phép cộng</td><td>10 + 5</td><td><b class='text-success'>15</b></td></tr>
<tr><td>Phép trừ</td><td>10 - 5</td><td><b class='text-success'>5</b></td></tr>
<tr><td>Phép nhân</td><td>10 * 5</td><td><b class='text-success'>50</b></td></tr>
<tr><td>Phép chia</td><td>10 / 5</td><td><b class='text-success'>2</b></td></tr>
</tbody>
</table>
</div></div></div>
</body>
</html>
